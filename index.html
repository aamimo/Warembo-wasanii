<!DOCTYPE html>
<html>
<head>
  <title>Amimo Shop</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>🛍️ Amimo Shop</h1>
  <p> welcome to amimo shop </p>

  <input type="text" id="search" placeholder="Search products...">
</header>

<nav>
  <button onclick="filterCategory('All')">All</button>
  <button onclick="filterCategory('Shoes')">Shoes</button>
  <button onclick="filterCategory('Clothes')">Clothes</button>
  <button onclick="filterCategory('Phones')">Phones</button>
  <button onclick="filterCategory('Electronics')">Electronics</button>
</nav>

<main>
  <div id="product-grid"></div>
</main>

<aside>
  <h2>Cart 🛒</h2>
  <ul id="cart"></ul>
  <button onclick="checkout()">Checkout (WhatsApp)</button>
</aside>

<script src="products.js"></script>
<script src="app.js"></script>

</body>
</html>
